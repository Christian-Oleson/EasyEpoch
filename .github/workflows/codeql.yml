name: CodeQL

on:
  # CodeQL runs weekly only — push/PR triggers were burning ~5–10 min
  # per run. Weekly + on-demand is sufficient coverage for a library
  # repo and keeps Actions minutes bounded. Re-enable push/PR triggers
  # below if a high-severity finding window opens.
  schedule:
    - cron: '25 14 * * 1' # Weekly on Monday
  workflow_dispatch:
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]

# Default minimal permissions at the workflow level. The analyze job widens
# to security-events:write so it can upload SARIF results.
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'
