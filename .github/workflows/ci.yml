name: CI

on:
  pull_request:
    branches: ['*']
  push:
    branches: [main]

# Default minimal permissions; jobs widen only as needed.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # PRs run a single Node version to save Actions minutes; pushes to
        # main run the full 20/22/24 matrix so cross-version regressions
        # still get caught before release.
        node-version: ${{ fromJSON(github.event_name == 'pull_request' && '[22]' || '[20, 22, 24]') }}
    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run tests
        run: npm test
